<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Avare — Molière — Étude Intégrale</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a0a00;--gold:#c9912a;--gold2:#e8b84b;--cream:#fdf6e3;--paper:#f5ecd1;
  --dark:#1a0a00;--red:#8b1a1a;--green:#1a5c2a;--blue:#1a3a6b;
  --card:#fffdf5;--bdr:#d4b896;--txt:#3d2b1a;
  --ok:#15803d;--bad:#dc2626;--acc:#1a3a6b;--acc2:#2a5ab8;
  --shadow: 0 4px 24px rgba(26,10,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',Georgia,serif;background:var(--cream);color:var(--txt);line-height:1.65;min-height:100vh;}

/* ── CURTAIN INTRO ─────────────────────────────────────────────── */
#curtain{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#cl{position:absolute;top:0;left:0;width:50%;height:100%;background:linear-gradient(to right,#3d0000,#6b0000);transform-origin:left center;transition:transform 1.1s cubic-bezier(.7,0,.3,1);}
#cr{position:absolute;top:0;right:0;width:50%;height:100%;background:linear-gradient(to left,#3d0000,#6b0000);transform-origin:right center;transition:transform 1.1s cubic-bezier(.7,0,.3,1);}
.curtain-text{position:relative;z-index:1;text-align:center;color:#e8b84b;font-family:'Playfair Display',serif;opacity:1;transition:opacity .4s;}
.curtain-text h2{font-size:clamp(28px,5vw,52px);font-style:italic;text-shadow:0 2px 12px rgba(0,0,0,.5);}
.curtain-text p{font-size:16px;opacity:.8;margin-top:8px;font-weight:300;letter-spacing:2px;text-transform:uppercase;}
.curtain-folds{position:absolute;top:0;width:100%;height:100%;pointer-events:none;}
.fold{position:absolute;top:0;height:100%;width:4px;background:linear-gradient(rgba(0,0,0,.3),transparent,rgba(0,0,0,.3));}
#cl .fold:nth-child(1){left:20%}#cl .fold:nth-child(2){left:40%}#cl .fold:nth-child(3){left:60%}#cl .fold:nth-child(4){left:80%}
#cr .fold:nth-child(1){right:20%}#cr .fold:nth-child(2){right:40%}#cr .fold:nth-child(3){right:60%}#cr .fold:nth-child(4){right:80%}
.curtain-open #cl{transform:translateX(-100%);}
.curtain-open #cr{transform:translateX(100%);}
.curtain-open .curtain-text{opacity:0;}

/* ── NAVBAR ─────────────────────────────────────────────────────── */
.nb{background:var(--ink);padding:0 24px;display:flex;justify-content:space-between;align-items:center;min-height:58px;box-shadow:0 2px 16px rgba(0,0,0,.4);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);}
.nb .logo{color:var(--gold);font-family:'Playfair Display',serif;font-size:17px;font-style:italic;cursor:pointer;letter-spacing:.3px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nb .logo svg{flex-shrink:0;}
.nb .nm{display:flex;gap:4px;flex-wrap:wrap;}
.nb .nm button{background:none;border:none;color:#c8b49a;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;border-radius:4px;transition:all .15s;font-family:'Lato',serif;letter-spacing:.4px;text-transform:uppercase;}
.nb .nm button:hover,.nb .nm button.at{color:#fff;background:rgba(201,145,42,.2);color:var(--gold2);}
.nb .nm button.at{border-bottom:2px solid var(--gold);}

/* ── MAIN ───────────────────────────────────────────────────────── */
.main{max-width:1000px;margin:0 auto;padding:32px 18px 60px;}
.panel{display:none;animation:panelIn .4s ease;}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ── HEADINGS ───────────────────────────────────────────────────── */
h1{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,28px);color:var(--ink);margin:0 0 24px;padding-bottom:12px;border-bottom:3px solid var(--gold);display:flex;align-items:center;gap:12px;}
h1 .h1-icon{flex-shrink:0;}
h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin:0 0 14px;}

/* ── HERO ACCUEIL ───────────────────────────────────────────────── */
.hero{display:grid;grid-template-columns:1fr 220px;gap:28px;align-items:center;margin-bottom:32px;background:var(--paper);border:1px solid var(--bdr);border-radius:12px;padding:28px 28px 28px 32px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.hero-text h2{font-family:'Playfair Display',serif;font-size:clamp(18px,3vw,24px);color:var(--ink);margin-bottom:10px;}
.hero-text p{font-size:14px;color:#6b4c2a;line-height:1.7;}
.hero-mascot{display:flex;justify-content:center;align-items:center;}

/* ── HARPAGON MASCOT SVG ────────────────────────────────────────── */
#mascot-wrap{cursor:pointer;}
#harpagon-body{transform-origin:center bottom;animation:sway 4s ease-in-out infinite;}
#harpagon-head{transform-origin:center bottom;animation:nod 5s ease-in-out infinite;}
#harpagon-arm-r{transform-origin:50px 120px;animation:clutch 3s ease-in-out infinite;}
#harpagon-coin{animation:coinSpin 2s linear infinite;}
@keyframes sway{0%,100%{transform:rotate(-1.5deg);}50%{transform:rotate(1.5deg);}}
@keyframes nod{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes clutch{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(4deg);}}
@keyframes coinSpin{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}
@keyframes eyeBlink{0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(0.05);}}
#eye-l,#eye-r{transform-origin:center;animation:eyeBlink 3.5s ease-in-out infinite;}

/* ── STAT CARDS ─────────────────────────────────────────────────── */
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.hcard{background:var(--paper);border:2px solid var(--bdr);border-radius:10px;padding:20px;text-align:center;position:relative;overflow:hidden;transition:transform .2s;}
.hcard:hover{transform:translateY(-3px);}
.hcard::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(to right,var(--gold),var(--gold2));}
.hcard .big{display:block;font-family:'Playfair Display',serif;font-size:42px;font-weight:800;color:var(--gold);line-height:1;}
.hcard .lbl{font-size:12px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.8px;color:#6b4c2a;}

/* ── DASHBOARD CARDS ────────────────────────────────────────────── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.dcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.dcard::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:var(--gold);transform:scaleY(0);transition:transform .2s;transform-origin:bottom;}
.dcard:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(201,145,42,.15);transform:translateY(-2px);}
.dcard:hover::before{transform:scaleY(1);}
.dcard h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink);margin-bottom:8px;}
.dcard p{font-size:13px;color:#6b4c2a;margin:0;line-height:1.6;}
.dcard .dcard-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);opacity:.12;}

/* ── LECONS ─────────────────────────────────────────────────────── */
.atabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;padding:12px;background:var(--paper);border-radius:8px;border:1px solid var(--bdr);}
.atab{padding:7px 18px;border-radius:20px;border:1.5px solid var(--bdr);background:transparent;color:var(--txt);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;font-family:'Lato',serif;}
.atab:hover{border-color:var(--gold);color:var(--ink);}
.atab.active{background:var(--ink);border-color:var(--ink);color:var(--gold);}
.pbox{font-style:italic;color:var(--acc);font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,#e8f0fb,#f0f6ff);padding:14px 18px;border-radius:8px;font-size:14px;border-left:4px solid var(--acc2);line-height:1.6;}
.lb{border:1px solid var(--bdr);border-radius:10px;margin-bottom:20px;overflow:hidden;background:var(--card);box-shadow:0 2px 8px rgba(26,10,0,.05);}
.lh{background:linear-gradient(to right,var(--paper),var(--cream));padding:14px 22px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;border-bottom:2px solid var(--bdr);color:var(--ink);display:flex;justify-content:space-between;align-items:center;}
.lbody{padding:22px;}
.mt{font-weight:700;color:var(--ink);margin-top:18px;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.mt::before{content:'';display:inline-block;width:16px;height:2px;background:var(--gold);}
.qbox{background:linear-gradient(135deg,#f0fdf4,#e6f7ec);border-left:4px solid var(--green);padding:13px 16px;margin:10px 0;font-style:italic;font-size:14px;color:#145c24;border-radius:0 8px 8px 0;line-height:1.6;}
.bdg{font-size:11px;padding:4px 12px;border-radius:12px;font-weight:700;white-space:nowrap;}
.bn{background:#f0e8d8;color:#7a5c2a;}
.bd{background:#d4edda;color:#1a5c2a;}

/* ── QCM GRID ───────────────────────────────────────────────────── */
.acgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;margin-top:14px;}
.acard{border:2px solid var(--bdr);border-radius:12px;padding:24px 14px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card);position:relative;overflow:hidden;}
.acard::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:var(--gold);transform:scaleX(0);transition:transform .2s;}
.acard:hover{background:var(--ink);color:#f5ecd1;transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,10,0,.18);}
.acard:hover::after{transform:scaleX(1);}
.acard .num{display:block;font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:var(--gold);transition:color .15s;line-height:1.1;}
.acard:hover .num{color:var(--gold2);}
.acard .albl{font-size:14px;font-weight:700;display:block;margin-bottom:4px;font-family:'Playfair Display',serif;}
.acard .asub{font-size:11px;line-height:1.4;opacity:.6;}
.acard .acnt{margin-top:10px;font-size:11px;font-weight:700;display:inline-block;padding:3px 12px;background:var(--paper);border-radius:10px;transition:all .15s;}
.acard:hover .acnt{background:rgba(255,255,255,.15);color:var(--gold2);}
.slist{display:flex;flex-direction:column;gap:10px;}
.sitem{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bdr);padding:14px 20px;border-radius:8px;background:var(--card);cursor:pointer;transition:all .15s;}
.sitem:hover{border-color:var(--gold);background:var(--paper);padding-left:24px;}

/* ── QUIZ ENGINE ────────────────────────────────────────────────── */
.qhdr{display:flex;justify-content:space-between;align-items:center;background:var(--paper);padding:12px 20px;border:1px solid var(--bdr);border-radius:8px;margin-bottom:24px;}
.qhdr-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);}
.qctr-wrap{display:flex;align-items:center;gap:12px;}
.qprogbar{width:120px;height:6px;background:#ddd;border-radius:3px;overflow:hidden;}
.qprogbar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold2));border-radius:3px;transition:width .3s;}
.qsl{display:none;}
.qsl.active{display:block;animation:qIn .35s ease;}
@keyframes qIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.qtext{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);margin-bottom:20px;line-height:1.5;font-weight:600;}
.albl2{display:flex;align-items:flex-start;gap:14px;border:1.5px solid var(--bdr);padding:13px 16px;border-radius:8px;cursor:pointer;background:var(--card);margin-bottom:10px;transition:all .2s;font-size:14px;line-height:1.5;}
.albl2:hover{background:var(--paper);border-color:var(--gold);}
.albl2.ans-correct{background:#f0fdf4;border-color:#15803d;animation:correctPulse .5s ease;}
.albl2.ans-wrong{background:#fef2f2;border-color:#dc2626;animation:wrongShake .4s ease;}
@keyframes correctPulse{0%{transform:scale(1);}40%{transform:scale(1.02);}100%{transform:scale(1);}}
@keyframes wrongShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.albl2 .opt-letter{width:28px;height:28px;flex-shrink:0;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--gold);font-family:'Playfair Display',serif;transition:all .2s;}
.albl2:hover .opt-letter{background:var(--ink);border-color:var(--ink);color:var(--gold);}
.albl2.ans-correct .opt-letter{background:#15803d;border-color:#15803d;color:#fff;}
.albl2.ans-wrong .opt-letter{background:#dc2626;border-color:#dc2626;color:#fff;}
.albl2 input[type=radio]{display:none;}
.expl{margin-top:16px;padding:14px 16px;border-radius:8px;display:none;font-size:14px;line-height:1.6;animation:explIn .3s ease;}
@keyframes explIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.eok{background:#f0fdf4;color:#15652a;border:1px solid #bbf7d0;}
.ebad{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.abar{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--bdr);}
.btn{padding:10px 24px;border-radius:6px;font-weight:700;cursor:pointer;border:none;font-size:13px;transition:all .15s;font-family:'Lato',serif;letter-spacing:.4px;}
.bbl{background:var(--ink);color:var(--gold);border:1px solid var(--gold);}
.bbl:hover{background:var(--gold);color:var(--ink);}
.bbl:disabled{background:#ddd;color:#aaa;border-color:#ddd;cursor:not-allowed;}
.bgr{background:transparent;color:var(--txt);border:1px solid var(--bdr);}
.bgr:hover{background:var(--paper);border-color:var(--gold);}
.bbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--bdr);border-radius:6px;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--txt);margin-bottom:20px;transition:all .15s;font-family:'Lato',serif;}
.bbtn:hover{background:var(--paper);border-color:var(--gold);color:var(--ink);}

/* ── SCORE POPUP ────────────────────────────────────────────────── */
#score-popup{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,10,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
#score-popup.show{display:flex;animation:fadeIn .3s ease;}
.score-card{background:var(--cream);border:2px solid var(--gold);border-radius:16px;padding:40px 48px;text-align:center;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;animation:scoreIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes scoreIn{from{opacity:0;transform:scale(.8) translateY(20px);}to{opacity:1;transform:none;}}
.score-card .score-big{font-family:'Playfair Display',serif;font-size:72px;font-weight:800;color:var(--gold);line-height:1;}
.score-card .score-label{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:#6b4c2a;margin-top:4px;}
.score-card .score-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--ink);margin:16px 0;line-height:1.4;}
.score-card .score-detail{font-size:13px;color:#6b4c2a;margin-bottom:24px;}
.confetti-piece{position:absolute;width:8px;height:8px;animation:confettiFly 1.2s ease forwards;}
@keyframes confettiFly{from{opacity:1;transform:translate(0,0) rotate(0deg);}to{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(720deg);}}

/* ── VOCAB THEATRE ──────────────────────────────────────────────── */
.vocab-stage{background:var(--paper);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.vocab-stage-header{background:var(--ink);padding:16px 22px;display:flex;align-items:center;gap:12px;}
.vocab-stage-header h3{font-family:'Playfair Display',serif;color:var(--gold);font-style:italic;font-size:16px;}
.vocab-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:20px;}
.vocab-term-card{border:1.5px solid var(--bdr);border-radius:8px;overflow:hidden;cursor:pointer;background:var(--card);transition:all .2s;}
.vocab-term-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 6px 18px rgba(201,145,42,.15);}
.vtc-front{padding:18px;text-align:center;}
.vtc-word{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.vtc-def{font-size:12px;color:#7a5c2a;line-height:1.4;font-style:italic;}
.vtc-icon{font-size:24px;margin-bottom:8px;}
.stbl{width:100%;border-collapse:collapse;margin-top:6px;}
.stbl th,.stbl td{border:1px solid var(--bdr);padding:10px 14px;text-align:left;font-size:13px;}
.stbl th{background:var(--paper);color:var(--ink);font-weight:700;font-family:'Playfair Display',serif;}
.stbl tr:nth-child(even) td{background:#fef9f0;}

/* ── MOYENNE ─────────────────────────────────────────────────────── */
.mtop{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.mst{background:var(--paper);border:1px solid var(--bdr);border-radius:10px;padding:18px;text-align:center;}
.mstl{font-size:11px;font-weight:700;color:#8b6a3a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.mstv{font-family:'Playfair Display',serif;font-size:34px;font-weight:800;color:var(--gold);}
.asec{margin-bottom:14px;}
.asech{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--paper);border-radius:7px;cursor:pointer;border:1px solid var(--bdr);transition:background .15s;}
.asech:hover{background:#ede5d4;}
.asect{font-weight:700;color:var(--ink);font-size:14px;font-family:'Playfair Display',serif;}
.asecs{font-weight:700;color:var(--gold);font-size:14px;}
.abody{overflow:hidden;max-height:0;transition:max-height .35s ease;}
.abody.open{max-height:2000px;}
.pw{background:#e0d5c0;border-radius:4px;height:7px;overflow:hidden;}
.pb{background:linear-gradient(to right,var(--green),#2d8a45);height:100%;transition:width .6s ease;}

/* ── AIDE ────────────────────────────────────────────────────────── */
.aide-section{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:24px;margin-bottom:16px;}
.aide-section h3{font-family:'Playfair Display',serif;color:var(--ink);margin-bottom:12px;font-size:16px;}
.aide-item{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start;}
.aide-num{width:28px;height:28px;background:var(--ink);color:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;font-family:'Playfair Display',serif;}
.aide-text{font-size:14px;line-height:1.6;}

/* ── SEC SEP ─────────────────────────────────────────────────────── */
.sec-sep{border-top:2px solid var(--bdr);margin:28px 0 22px;padding-top:22px;}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8b6a3a;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* ── AUDIO INDICATOR ─────────────────────────────────────────────── */
#audio-btn{position:fixed;bottom:20px;right:20px;width:42px;height:42px;background:var(--ink);border:2px solid var(--gold);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.3);}
#audio-btn:hover{transform:scale(1.1);background:var(--gold);}
#audio-btn:hover svg{stroke:#1a0a00;}
#audio-btn svg{stroke:var(--gold);}
#audio-btn.muted svg{opacity:.4;}

/* ── THEATRE IMAGES ──────────────────────────────────────────────── */
.scene-illustration{width:100%;max-width:340px;margin:0 auto 20px;display:block;}
.illus-strip{display:flex;gap:12px;margin-bottom:20px;overflow-x:auto;padding-bottom:
